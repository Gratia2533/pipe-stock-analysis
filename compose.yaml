services:
  finance-internal:
    build:
      context: .
      dockerfile: Dockerfile
    image: finance-mcp:local
    container_name: finance-mcp-internal
    restart: unless-stopped
    environment:
      DATA_BACKEND: direct
      FINMIND_TOKEN: "${FINMIND_TOKEN:-}"
      FINNHUB_API_KEY: "${FINNHUB_API_KEY:-}"
      UPSTREAM_MAX_RESPONSE_BYTES: "${UPSTREAM_MAX_RESPONSE_BYTES:-4194304}"
      REQUEST_TIMEOUT_SECONDS: "${REQUEST_TIMEOUT_SECONDS:-15}"
      REQUEST_MAX_ATTEMPTS: "${REQUEST_MAX_ATTEMPTS:-3}"
      REQUEST_RETRY_BASE_SECONDS: "${REQUEST_RETRY_BASE_SECONDS:-0.5}"
      REQUEST_MAX_CONCURRENCY: "${REQUEST_MAX_CONCURRENCY:-8}"
      CACHE_TTL_SECONDS: "${CACHE_TTL_SECONDS:-300}"
      CACHE_MAX_ENTRIES: "${CACHE_MAX_ENTRIES:-256}"
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8010"
      MCP_STREAMABLE_HTTP_PATH: /mcp
      MCP_STATELESS_HTTP: "true"
      FINANCE_OAUTH_ENABLED: "false"
    ports:
      - "127.0.0.1:8010:8010"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/healthz', timeout=3)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  finance-oauth:
    build:
      context: .
      dockerfile: Dockerfile
    image: finance-mcp:local
    container_name: finance-mcp-oauth
    restart: unless-stopped
    environment:
      DATA_BACKEND: direct
      FINMIND_TOKEN: "${FINMIND_TOKEN:-}"
      FINNHUB_API_KEY: "${FINNHUB_API_KEY:-}"
      UPSTREAM_MAX_RESPONSE_BYTES: "${UPSTREAM_MAX_RESPONSE_BYTES:-4194304}"
      REQUEST_TIMEOUT_SECONDS: "${REQUEST_TIMEOUT_SECONDS:-15}"
      REQUEST_MAX_ATTEMPTS: "${REQUEST_MAX_ATTEMPTS:-3}"
      REQUEST_RETRY_BASE_SECONDS: "${REQUEST_RETRY_BASE_SECONDS:-0.5}"
      REQUEST_MAX_CONCURRENCY: "${REQUEST_MAX_CONCURRENCY:-8}"
      CACHE_TTL_SECONDS: "${CACHE_TTL_SECONDS:-300}"
      CACHE_MAX_ENTRIES: "${CACHE_MAX_ENTRIES:-256}"
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8011"
      MCP_STREAMABLE_HTTP_PATH: /mcp
      MCP_STATELESS_HTTP: "true"
      FINANCE_OAUTH_ENABLED: "true"
      FINANCE_OAUTH_ISSUER_URL: "${FINANCE_OAUTH_ISSUER_URL:-http://127.0.0.1:8011}"
      FINANCE_OAUTH_RESOURCE_URL: "${FINANCE_OAUTH_RESOURCE_URL:-http://127.0.0.1:8011/mcp}"
      FINANCE_OAUTH_USERNAME: "${FINANCE_OAUTH_USERNAME:-gratia}"
      FINANCE_OAUTH_PASSWORD: "${FINANCE_OAUTH_PASSWORD:-}"
      FINANCE_OAUTH_DATABASE_PATH: /data/oauth/state.sqlite3
      FINANCE_OAUTH_SCOPE: "${FINANCE_OAUTH_SCOPE:-finance:read}"
    ports:
      - "127.0.0.1:8011:8011"
    volumes:
      - ./data/oauth:/data/oauth
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8011/healthz', timeout=3)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
